name: Deploy to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: [main]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Detect custom domain
        id: domain
        run: |
          if [ -f "public/CNAME" ]; then
            CUSTOM_DOMAIN=$(cat public/CNAME | tr -d ' \n')
            echo "Found CNAME: $CUSTOM_DOMAIN"
            echo "custom_domain=$CUSTOM_DOMAIN" >> $GITHUB_OUTPUT
            echo "site_url=https://$CUSTOM_DOMAIN" >> $GITHUB_OUTPUT
          else
            echo "No CNAME file found, using GitHub Pages default URL"
            echo "custom_domain=" >> $GITHUB_OUTPUT
            echo "site_url=${{ steps.pages.outputs.base_url }}" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        run: pnpm install

      - name: Build site
        run: |
          if [ -n "${{ steps.domain.outputs.custom_domain }}" ]; then
            # Custom domain: no base path needed
            pnpm astro build --site "${{ steps.domain.outputs.site_url }}"
          else
            # Default GitHub Pages URL: include base path for project sites
            pnpm astro build \
              --site "${{ steps.pages.outputs.base_url }}" \
              --base "${{ steps.pages.outputs.base_path }}"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
